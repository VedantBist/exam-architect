services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: exam_architect
      POSTGRES_USER: exam_user
      POSTGRES_PASSWORD: exam_password
    ports:
      - "5432:5432"
    volumes:
      - exam_architect_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam_user -d exam_architect"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/exam_architect
      DB_USERNAME: exam_user
      DB_PASSWORD: exam_password
      PORT: 8080
      SQL_LOG_LEVEL: warn
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  exam_architect_staging_pgdata:
