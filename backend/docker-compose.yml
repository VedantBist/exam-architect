services:
  postgres:
    image: postgres:16
    container_name: exam-architect-postgres
    environment:
      POSTGRES_DB: exam_architect
      POSTGRES_USER: exam_user
      POSTGRES_PASSWORD: exam_password
    ports:
      - "5432:5432"
    volumes:
      - exam_architect_pgdata:/var/lib/postgresql/data

volumes:
  exam_architect_pgdata:
